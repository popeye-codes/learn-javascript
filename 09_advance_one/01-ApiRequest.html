<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: #212121;">
    
    <!-- 0	UNSENT	Client has been created. open() not called yet.
1	OPENED	open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	Downloading; responseText holds partial data.
4	DONE	The operation is complete. -->

</body>

<script>
    // ===================== XMLHttpRequest (XHR) Example =====================

    // API endpoint from which we want to fetch data
    const requestUrl = "https://api.github.com/users/hiteshchoudhary";

    // Create an XMLHttpRequest object
    // This object is responsible for sending HTTP requests to the server.
    const xhr = new XMLHttpRequest();

    // Configure the request
    // Syntax: open(method, url)
    // GET -> Used to retrieve data
    // NOTE: open() only prepares the request; it DOES NOT send it.
    xhr.open("GET", requestUrl);

    // This event fires EVERY time the request's readyState changes.
    // Since this is a normal function, 'this' refers to the current XHR object.
    xhr.onreadystatechange = function () {

        // Print current request state (0 → 4)
        console.log("Ready State:", xhr.readyState);

        // Process the response only after the request is completely finished.
        if (xhr.readyState === 4) {

            // HTTP Status Codes
            // 200 -> Success
            // 404 -> Resource not found
            // 500 -> Internal Server Error

            if (xhr.status === 200) {

                // Server sends response as a JSON STRING.
                // JSON.parse() converts that string into a JavaScript object.
                const data = JSON.parse(this.responseText);

                console.log(typeof data); // object

                // Entire response object
                console.log(data);

                // Access object properties normally
                console.log("Followers:", data.followers);
                console.log("Name:", data.name);
                console.log("Avatar:", data.avatar_url);

            } else {
                console.log("Request Failed");
                console.log("Status Code:", xhr.status);
            }
        }
    };

    // Actually send the request to the server.
    // Without send(), nothing happens.
    xhr.send();
</script>



</html>
