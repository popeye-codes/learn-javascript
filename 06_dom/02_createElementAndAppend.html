<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Element</title>
</head>

<body style="background-color: #212121; color: #fff;">

</body>

<script>

    // ============================================================
    // Create Element
    // ============================================================

    const div = document.createElement("div");

    console.log(div);


    // ============================================================
    // Add Attributes
    // ============================================================

    div.className = "main";

    div.id = Math.floor(Math.random() * 10 + 1);

    // Preferred for adding/updating attributes.
    div.setAttribute("title", "generated-title");


    // ============================================================
    // Add Styles
    // ============================================================

    div.style.backgroundColor = "green";
    div.style.padding = "15px";


    // ============================================================
    // Add Text
    // ============================================================

    // Method 1
    // div.innerText = "This div is made using JavaScript";

    // Method 2 (Preferred)

    const addText = document.createTextNode(
        "This div is made using JavaScript"
    );

    div.appendChild(addText);


    // ============================================================
    // Attach Element to the DOM
    // ============================================================

    document.body.appendChild(div);


    // ============================================================
    // Notes
    // ============================================================

    // createElement()   -> Creates a new element.

    // className         -> Adds a class.

    // id                -> Adds an id.

    // setAttribute()    -> Creates/updates an attribute.

    // createTextNode()  -> Creates a text node.

    // appendChild()     -> Adds a child node.

    // body.appendChild()
    //                  -> Displays the element on the webpage.

</script>

</html>
